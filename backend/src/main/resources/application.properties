spring.application.name=jikgeunbap-server

spring.datasource.url=jdbc:h2:mem:jikgeunbapdb;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Anthropic API ─────────────────────────────────────────────────────────────
# 비워두면 룰베이스 추천 이유로 자동 fallback (비용 0).
# 활성화: export ANTHROPIC_API_KEY="sk-ant-..." 후 서버 재시작
anthropic.api-key=${ANTHROPIC_API_KEY:}

# ── Kakao Local API ──────────────────────────────────────────────────────────
# 비워두면 /api/restaurants/import 가 0개 import (시드 데이터만 사용).
# 활성화: export KAKAO_REST_API_KEY="..." 후 서버 재시작
# 키 발급: https://developers.kakao.com → 내 애플리케이션 → REST API 키
kakao.rest-api-key=${KAKAO_REST_API_KEY:}
